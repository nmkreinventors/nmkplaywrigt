#----------Environment------------------
env=dev

#----------Application URLS-------------
base.url.dev=https://www.amazon.com
base.url.qa=https://www.amazon.com
base.url.prod=https://www.amazon.com

#-------------Browser---------------------
browser=chrome

#------------CrossBrowser-----------------
crossbrowser=

#------------Parallel Execution------------
parallelInstances=3

#------------Parallel Execution------------
headless=false

#------------TimeOuts (milliseconds)-----------
assert.timeout=10000
navigation.timeout=60000
default.timeout=60000

#-----Retry Count-------------------
retry.count=1

#-----Screenshot-------------------
# on_failure | always | never
screenshot.mode=on_failure

#-----Trace-------------------
# always | never
trace.mode=always

#-----video Recording-------------------
# always | never
video.mode=always

#-----Report-------------------
extent.report.dir=test-output/ExtentReports
extent.report.name=Automation_Report

#-----video Recording-------------------
viewport.width=1920
viewport.height=1080